<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Financial Signals{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Financial Signals</div>
        <div class="nav-links">
            <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Insider Trades</a>
            <a href="/signals" class="nav-link{% if '/signals' in request.url.path %} active{% endif %}">Signals</a>
            <a href="/congressional" class="nav-link{% if '/congressional' in request.url.path %} active{% endif %}">Congressional</a>
            <a href="/admin" class="nav-link{% if '/admin' in request.url.path %} active{% endif %}">Admin</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
