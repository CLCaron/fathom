{% extends "base.html" %}
{% block title %}Dashboard - Financial Signals{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value">{{ stats.total }}</div>
            <div class="stat-label">Total Trades</div>
        </div>
        <div class="stat-card stat-buy">
            <div class="stat-value">{{ stats.buys }}</div>
            <div class="stat-label">Buys</div>
        </div>
        <div class="stat-card stat-sell">
            <div class="stat-value">{{ stats.sells }}</div>
            <div class="stat-label">Sells</div>
        </div>
    </div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <h3>Filters</h3>
            <form id="filter-form" hx-get="/api/trades" hx-target="#trades-table" hx-swap="innerHTML">
                <div class="filter-group">
                    <label>Time Range</label>
                    <select name="days" onchange="this.form.requestSubmit()">
                        <option value="1" {% if filters.days == 1 %}selected{% endif %}>Today</option>
                        <option value="7" {% if filters.days == 7 %}selected{% endif %}>Last 7 days</option>
                        <option value="14" {% if filters.days == 14 %}selected{% endif %}>Last 14 days</option>
                        <option value="30" {% if filters.days == 30 %}selected{% endif %}>Last 30 days</option>
                        <option value="90" {% if filters.days == 90 %}selected{% endif %}>Last 90 days</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Trade Type</label>
                    <select name="trade_type" onchange="this.form.requestSubmit()">
                        <option value="">All</option>
                        <option value="BUY" {% if filters.trade_type == 'BUY' %}selected{% endif %}>Buys Only</option>
                        <option value="SELL" {% if filters.trade_type == 'SELL' %}selected{% endif %}>Sells Only</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Sector</label>
                    <select name="sector" onchange="this.form.requestSubmit()">
                        <option value="">All Sectors</option>
                        {% for sector_name, count in sector_counts %}
                        <option value="{{ sector_name }}" {% if filters.sector == sector_name %}selected{% endif %}>
                            {{ sector_name }} ({{ count }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </form>
        </aside>

        <section class="main-content">
            <div class="section-header">
                <h2>Recent Insider Trades</h2>
                <button class="btn btn-sm"
                        hx-post="/admin/run/edgar_scraper"
                        hx-swap="none"
                        onclick="this.textContent='Scraping...'; this.disabled=true; setTimeout(() => { this.textContent='Refresh Data'; this.disabled=false; htmx.trigger('#trades-table', 'load'); }, 5000)">
                    Refresh Data
                </button>
            </div>

            <div id="trades-table">
                {% include "components/trades_table.html" %}
            </div>
        </section>
    </div>
</div>
{% endblock %}
